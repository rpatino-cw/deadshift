<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="50%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines (data center floor) -->
  <g opacity="0.08" stroke="#4488ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Animated scanning line -->
  <rect x="0" y="0" width="800" height="3" fill="#e74c3c" opacity="0.15">
    <animate attributeName="y" values="0;200;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Server rack silhouettes -->
  <g opacity="0.15" fill="#4488ff">
    <rect x="50" y="50" width="30" height="100" rx="2"/>
    <rect x="52" y="55" width="26" height="4" rx="1" fill="#2ecc71" opacity="0.6"/>
    <rect x="52" y="63" width="26" height="4" rx="1" fill="#2ecc71" opacity="0.6"/>
    <rect x="52" y="71" width="26" height="4" rx="1" fill="#e74c3c" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="52" y="79" width="26" height="4" rx="1" fill="#2ecc71" opacity="0.6"/>

    <rect x="720" y="50" width="30" height="100" rx="2"/>
    <rect x="722" y="55" width="26" height="4" rx="1" fill="#2ecc71" opacity="0.6"/>
    <rect x="722" y="63" width="26" height="4" rx="1" fill="#f39c12" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="722" y="71" width="26" height="4" rx="1" fill="#2ecc71" opacity="0.6"/>
    <rect x="722" y="79" width="26" height="4" rx="1" fill="#2ecc71" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="monospace, Courier" font-size="56" font-weight="bold" fill="url(#redGlow)" filter="url(#glow)">
    DEADSHIFT
  </text>

  <!-- Subtitle -->
  <text x="400" y="120" text-anchor="middle" font-family="monospace, Courier" font-size="14" fill="#8888aa" letter-spacing="4">
    LOCAL MULTIPLAYER SOCIAL DEDUCTION
  </text>

  <!-- Tagline with typing animation -->
  <text x="400" y="150" text-anchor="middle" font-family="monospace, Courier" font-size="12" fill="#e74c3c" opacity="0.8">
    The lights went out. Someone sabotaged the server room.
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Flashlight beam effect (cone from left) -->
  <ellipse cx="130" cy="100" rx="60" ry="40" fill="#ffcc00" opacity="0.03" filter="url(#softGlow)">
    <animate attributeName="cx" values="130;160;130" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Player dots with movement -->
  <circle cx="150" cy="140" r="6" fill="#e74c3c" opacity="0.7">
    <animate attributeName="cx" values="150;170;150" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;135;140" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="640" cy="130" r="6" fill="#3498db" opacity="0.7">
    <animate attributeName="cx" values="640;620;640" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="130;145;130" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="155" r="6" fill="#2ecc71" opacity="0.7">
    <animate attributeName="cx" values="680;660;680" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Border glow -->
  <rect x="1" y="1" width="798" height="198" rx="12" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
</svg>
