<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
    <filter id="g3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="180" fill="url(#bg3)" rx="10"/>

  <!-- CREW SIDE -->
  <g transform="translate(50,15)">
    <rect width="330" height="150" rx="10" fill="#0d1a0d" stroke="#2ecc71" stroke-width="1.5" opacity="0.8"/>
    <text x="165" y="28" text-anchor="middle" font-family="monospace" font-size="16" fill="#2ecc71" font-weight="bold" filter="url(#g3)">CREW</text>

    <!-- Player icons -->
    <circle cx="50" cy="65" r="14" fill="#3498db"/>
    <circle cx="90" cy="65" r="14" fill="#2ecc71"/>
    <circle cx="130" cy="65" r="14" fill="#f39c12"/>

    <!-- Task icons -->
    <g transform="translate(175,48)">
      <rect width="24" height="24" rx="3" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
      <text x="12" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="#2ecc71">~</text>
    </g>
    <g transform="translate(210,48)">
      <rect width="24" height="24" rx="3" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
      <text x="12" y="16" text-anchor="middle" font-family="monospace" font-size="14" fill="#f39c12">+</text>
    </g>
    <g transform="translate(245,48)">
      <rect width="24" height="24" rx="3" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
      <text x="12" y="17" text-anchor="middle" font-family="monospace" font-size="11" fill="#3498db">*</text>
    </g>
    <g transform="translate(280,48)">
      <rect width="24" height="24" rx="3" fill="#1a2a1a" stroke="#2ecc71" stroke-width="1"/>
      <text x="12" y="16" text-anchor="middle" font-family="monospace" font-size="12" fill="#9b59b6">#</text>
    </g>

    <text x="165" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#2ecc71">Cable racks  |  Swap PSUs</text>
    <text x="165" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#2ecc71">Check temps  |  Scan badges</text>
    <text x="165" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#1a6b1a">Complete all tasks to win</text>
  </g>

  <!-- VS -->
  <text x="400" y="100" text-anchor="middle" font-family="monospace" font-size="20" fill="#444" font-weight="bold">VS</text>

  <!-- IMPOSTOR SIDE -->
  <g transform="translate(420,15)">
    <rect width="330" height="150" rx="10" fill="#1a0d0d" stroke="#e74c3c" stroke-width="1.5" opacity="0.8"/>
    <text x="165" y="28" text-anchor="middle" font-family="monospace" font-size="16" fill="#e74c3c" font-weight="bold" filter="url(#g3)">
      IMPOSTOR
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </text>

    <!-- Impostor icon -->
    <circle cx="80" cy="65" r="14" fill="#e74c3c">
      <animate attributeName="r" values="14;16;14" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="80" y="70" text-anchor="middle" font-family="monospace" font-size="14" fill="#1a0d0d" font-weight="bold">?</text>

    <!-- Sabotage icons -->
    <g transform="translate(140,48)">
      <rect width="24" height="24" rx="3" fill="#2a1010" stroke="#e74c3c" stroke-width="1"/>
      <text x="12" y="17" text-anchor="middle" font-family="monospace" font-size="16" fill="#e74c3c">
        !
        <animate attributeName="opacity" values="1;0.2;1" dur="0.8s" repeatCount="indefinite"/>
      </text>
    </g>
    <g transform="translate(175,48)">
      <rect width="24" height="24" rx="3" fill="#2a1010" stroke="#e74c3c" stroke-width="1"/>
      <text x="12" y="17" text-anchor="middle" font-family="monospace" font-size="16" fill="#ff6b6b">X</text>
    </g>
    <g transform="translate(210,48)">
      <rect width="50" height="24" rx="3" fill="#2a1010" stroke="#e74c3c" stroke-width="1"/>
      <text x="25" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#e74c3c">KILL</text>
    </g>

    <text x="165" y="100" text-anchor="middle" font-family="monospace" font-size="10" fill="#e74c3c">Overheat servers</text>
    <text x="165" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#e74c3c">Cut cables  |  Trip power</text>
    <text x="165" y="138" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b1a1a">Sabotage 3 systems or kill crew</text>
  </g>
</svg>
