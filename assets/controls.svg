<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" fill="url(#bg4)" rx="10"/>

  <!-- WASD Keys -->
  <g transform="translate(60,30)">
    <!-- W -->
    <rect x="40" y="0" width="36" height="36" rx="6" fill="#1e1e3a" stroke="#555" stroke-width="1.5"/>
    <text x="58" y="24" text-anchor="middle" font-family="monospace" font-size="16" fill="#fff" font-weight="bold">W</text>
    <!-- A -->
    <rect x="0" y="42" width="36" height="36" rx="6" fill="#1e1e3a" stroke="#555" stroke-width="1.5"/>
    <text x="18" y="66" text-anchor="middle" font-family="monospace" font-size="16" fill="#fff" font-weight="bold">A</text>
    <!-- S -->
    <rect x="40" y="42" width="36" height="36" rx="6" fill="#1e1e3a" stroke="#555" stroke-width="1.5"/>
    <text x="58" y="66" text-anchor="middle" font-family="monospace" font-size="16" fill="#fff" font-weight="bold">S</text>
    <!-- D -->
    <rect x="80" y="42" width="36" height="36" rx="6" fill="#1e1e3a" stroke="#555" stroke-width="1.5"/>
    <text x="98" y="66" text-anchor="middle" font-family="monospace" font-size="16" fill="#fff" font-weight="bold">D</text>
    <text x="58" y="105" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">Move</text>
  </g>

  <!-- E Key -->
  <g transform="translate(210,42)">
    <rect width="50" height="50" rx="8" fill="#1a2a1a" stroke="#2ecc71" stroke-width="2"/>
    <text x="25" y="32" text-anchor="middle" font-family="monospace" font-size="22" fill="#2ecc71" font-weight="bold">E</text>
    <text x="25" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#2ecc71">Interact</text>
    <text x="25" y="90" text-anchor="middle" font-family="monospace" font-size="8" fill="#1a6b1a">Tasks &amp; Sabotage</text>
  </g>

  <!-- Q Key -->
  <g transform="translate(310,42)">
    <rect width="50" height="50" rx="8" fill="#2a1010" stroke="#e74c3c" stroke-width="2">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="25" y="32" text-anchor="middle" font-family="monospace" font-size="22" fill="#e74c3c" font-weight="bold">Q</text>
    <text x="25" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#e74c3c">Kill</text>
    <text x="25" y="90" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b1a1a">Impostor only</text>
  </g>

  <!-- SPACE Key -->
  <g transform="translate(410,42)">
    <rect width="130" height="50" rx="8" fill="#1a1a2e" stroke="#f39c12" stroke-width="2"/>
    <text x="65" y="32" text-anchor="middle" font-family="monospace" font-size="14" fill="#f39c12" font-weight="bold">SPACE</text>
    <text x="65" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#f39c12">Emergency Meeting</text>
  </g>

  <!-- ESC Key -->
  <g transform="translate(590,42)">
    <rect width="50" height="50" rx="8" fill="#1e1e3a" stroke="#555" stroke-width="1.5"/>
    <text x="25" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="#888" font-weight="bold">ESC</text>
    <text x="25" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">Back / Cancel</text>
  </g>

  <!-- Number Keys -->
  <g transform="translate(690,42)">
    <rect width="36" height="36" rx="6" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1.5"/>
    <text x="18" y="24" text-anchor="middle" font-family="monospace" font-size="16" fill="#9b59b6" font-weight="bold">1</text>
    <rect x="0" y="40" width="36" height="12" rx="3" fill="#9b59b6" opacity="0.2"/>
    <text x="18" y="50" text-anchor="middle" font-family="monospace" font-size="7" fill="#9b59b6">-9</text>
    <text x="18" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#9b59b6">Vote</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="160" width="800" height="40" fill="#0a0a12" rx="0"/>
  <text x="400" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#444">
    Flashlight vision only  ·  Dark data center  ·  Trust no one
  </text>
</svg>
